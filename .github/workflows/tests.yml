name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # Match the dev/prod server version the schema dump (database/schema/pgsql-schema.sql)
        # was generated from, so the load is byte-compatible.
        image: postgres:18
        env:
          POSTGRES_DB: campaign_tracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # phpunit.xml pins DB_CONNECTION=pgsql and DB_DATABASE=campaign_tracker_test;
      # these provide the connection target for the Postgres service.
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl
          coverage: none

      - name: Ensure psql client (Laravel loads the schema dump via psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test
